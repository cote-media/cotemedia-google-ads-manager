# LORAMER_OFFSITE_R2_BACKUP_V1
# Daily off-site backup of the Supabase Postgres DB to Cloudflare R2.
# Dormant until the 5 GitHub secrets exist (see OUT.txt setup checklist) and
# the first run fires. Additive — touches nothing in the app.
name: DB Backup to R2

on:
  schedule:
    # 03:30 UTC daily — deliberately clear of the 08:00 UTC /api/cron/sync run.
    - cron: "30 3 * * *"
  workflow_dispatch: {}

# Avoid overlapping runs if one is slow.
concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump (PostgreSQL client 17 — matches Supabase server major)
        # PG_MAJOR must equal the Supabase server's major version (verify with
        # `SELECT version();` in the Supabase SQL Editor). A mismatched pg_dump
        # refuses to dump a newer server. To change majors, edit PG_MAJOR only.
        env:
          PG_MAJOR: "17"
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y "postgresql-client-${PG_MAJOR}"
          pg_dump --version

      - name: Dump database (custom format, compressed)
        env:
          # Session pooler connection string (IPv4) — GitHub runners are
          # IPv4-only, so the direct (IPv6) connection cannot be used. NOT the
          # transaction pooler (transaction mode breaks pg_dump's session use).
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set"; exit 1
          fi
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          FILE="loramer-db-${TS}.dump"
          echo "FILE=${FILE}" >> "$GITHUB_ENV"
          # -Fc custom format (selective restore + parallelism), -Z9 max compression.
          pg_dump "$SUPABASE_DB_URL" --format=custom --compress=9 --no-owner --no-privileges --file "$FILE"
          ls -lh "$FILE"
          # Guard against a zero-byte / truncated dump slipping through green.
          if [ ! -s "$FILE" ]; then
            echo "::error::dump file is empty"; exit 1
          fi

      - name: Upload to Cloudflare R2 (S3-compatible API via aws-cli)
        env:
          # aws-cli is pre-installed on ubuntu-latest. R2 speaks the S3 API.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          for v in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_BUCKET; do
            if [ -z "${!v:-}" ]; then echo "::error::${v} secret is not set"; exit 1; fi
          done
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp "${FILE}" "s3://${R2_BUCKET}/${FILE}" --endpoint-url "${ENDPOINT}"
          echo "Uploaded ${FILE} to r2://${R2_BUCKET}/"

      - name: Prune backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          CUTOFF="$(date -u -d '30 days ago' +%s)"
          # List every object's key + LastModified, delete those past the cutoff.
          aws s3api list-objects-v2 --bucket "${R2_BUCKET}" --endpoint-url "${ENDPOINT}" \
            --query 'Contents[].[Key,LastModified]' --output text 2>/dev/null \
          | while read -r KEY LASTMOD; do
              [ -z "${KEY:-}" ] && continue
              OBJ_TS="$(date -u -d "${LASTMOD}" +%s)"
              if [ "${OBJ_TS}" -lt "${CUTOFF}" ]; then
                echo "Pruning ${KEY} (LastModified ${LASTMOD})"
                aws s3 rm "s3://${R2_BUCKET}/${KEY}" --endpoint-url "${ENDPOINT}"
              fi
            done
          echo "Prune pass complete."
